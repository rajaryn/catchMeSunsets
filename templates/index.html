<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Vesper</title>
    <meta
      name="description"
      content="Vesper: Drop a pin and share your sky. A beautiful, map-based gallery to capture and share sunsets and night skies."
    />

    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"
      crossorigin="anonymous"
    />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr" crossorigin="anonymous" defer></script>
    
    <script
      src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"
      defer
    ></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}?v=56"
    />

    <link rel="manifest" href="/manifest.json" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#fffcfb" />
    <link rel="apple-touch-icon" href="/static/images/icon-192.png" />
  </head>
  <body>
    <div id="page-curtain" class="page-curtain"></div>

    <div class="top-ui-layer">
      <div class="top-bar-container">
        <div class="brand-menu-container">
          <button
            id="brand-toggle"
            class="glass-pill brand-pill"
            aria-label="Open Menu"
          >
            <div class="hamburger-icon">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span class="brand-text">Vesper</span>
          </button>
        </div>

        <div class="glass-search-container">
          <span class="search-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input
            type="text"
            id="global-search-input"
            placeholder="Teleport to a city..."
            autocomplete="off"
          />
          <div id="global-search-results" class="search-results"></div>
        </div>
      </div>
    </div>

    <div id="side-menu" class="side-menu">
      <a
        href="{{ url_for('about') }}"
        class="menu-item smooth-nav"
        style="margin-top: 25px"
      >
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        </span>
        About Vesper
      </a>

      <a
        href="https://forms.gle/e7srtSUPsS7cwyuM8"
        class="menu-item"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </span>
        Send Feedback
      </a>

      <div style="height: 1px; background: rgba(128,128,128,0.2); margin: 10px 16px;"></div>

      <a href="#" id="theme-toggle" class="menu-item">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </span>
        Dark Mode
      </a>

      <a
        href="{{ url_for('privacy') }}"
        class="menu-item"
      >
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </span>
        Privacy Policy
      </a>
    </div>

    <div id="drawer-overlay" class="drawer-overlay"></div>

    <div id="map"></div>

    <button class="upload-btn" id="main-capture-btn" aria-label="Capture the sky">
      Capture
    </button>

    <div
      id="upload-sheet"
      class="about-drawer"
      style="padding-bottom: 40px; z-index: 3600"
    >
      <div class="drawer-handle" id="upload-handle"></div>

      <h2
        style="
          text-align: center;
          margin-bottom: 10px;
          font-size: 1.4rem;
          margin-top: 0;
        "
      >
        Archive the sky.
      </h2>

      <p
        style="
          text-align: center;
          color: inherit;
          opacity: 0.7;
          font-size: 0.95rem;
          margin-bottom: 25px;
          line-height: 1.4;
        "
      >
        Whether it's a glowing dusk, a moody twilight, or a quiet moon. Save the
        fading light.
      </p>

      <div
        class="type-selector"
        style="
          display: flex;
          justify-content: center;
          flex-wrap: wrap;
          gap: 15px;
          margin-bottom: 30px;
        "
      >
        <label
          style="
            color: inherit;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            white-space: nowrap;
          "
        >
          <input
            type="radio"
            name="capture_type"
            value="sun"
            checked
            style="margin-right: 8px"
          />
          <span
            style="
              font-size: 0.95rem;
              display: flex;
              align-items: center;
              gap: 6px;
            "
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            Dusk & Twilight
          </span>
        </label>

        <label
          style="
            color: inherit;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            white-space: nowrap;
          "
        >
          <input
            type="radio"
            name="capture_type"
            value="moon"
            style="margin-right: 8px"
          />
          <span
            style="
              font-size: 0.95rem;
              display: flex;
              align-items: center;
              gap: 6px;
            "
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            Night Sky
          </span>
        </label>
      </div>

      <button id="btn-camera" class="action-btn">
        <svg viewBox="0 0 24 24">
          <path
            d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
          ></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        Take Photo
      </button>

      <button id="btn-gallery" class="action-btn">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        Choose from Gallery
      </button>
    </div>

    <input
      type="file"
      id="file-input-gallery"
      accept="image/*"
      style="display: none"
    />
    <input
      type="file"
      id="file-input-camera"
      accept="image/*"
      capture="environment"
      style="display: none"
    />

    <div id="staging-area" class="staging-area">
      <div class="staging-top-bar">
        <span class="staging-close" id="close-staging">&times;</span>
        <span class="staging-title">Preview</span>
      </div>
      
      <div class="staging-content">
        
        <div class="staging-left-panel">
          <div class="preview-img-container">
              <div id="staging-badge" class="preview-badge" style="display: flex; align-items: center; justify-content: center;"></div>
              <img id="staging-img" src="">
          </div>
        </div>

        <div class="staging-right-panel">
          <div id="manual-search-wrapper" class="glass-search-container" style="display: none;">
              <span class="search-icon">
                  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              </span>
              <input type="text" id="manual-search" placeholder="Search city or location..." autocomplete="off" />
              <div id="manual-search-results" class="search-results"></div>
          </div>
          
          <button id="btn-live-location" class="secondary-action-btn" style="display: none;">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"></circle>
                  <path d="M12 2v2"></path>
                  <path d="M12 20v2"></path>
                  <path d="M2 12h2"></path>
                  <path d="M20 12h2"></path>
                  <circle cx="12" cy="12" r="7"></circle>
              </svg>
              Use current location
          </button>

          <div id="date-picker-container" style="display: none; flex-direction: column; width: 100%;">
            <div class="split-date-time">
                <div class="date-picker-wrapper half-width" id="date-wrapper-btn">
                    <div class="date-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <input type="text" id="manual-date" class="date-picker-input" placeholder="Select Date" title="Set date" readonly />
                    <div class="picker-chevron">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>

                <div class="date-picker-wrapper half-width" id="time-wrapper-btn">
                    <div class="date-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </div>
                    <input type="text" id="manual-time" class="date-picker-input" placeholder="Select Time" title="Set time" readonly />
                    <div class="picker-chevron">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
            </div>
            <p class="picker-hint">Defaults to current time. Tap to edit.</p>
          </div>

          <button class="action-btn primary-btn" id="btn-share-map" style="display: none;">Share to Map</button>
        </div>

      </div>
    </div>

    <div id="gallery-modal">
      <span
        class="close-btn"
        id="close-btn"
        role="button"
        aria-label="Close gallery"
        tabindex="0"
        >&times;</span
      >
      <div id="gallery-content" class="gallery-grid"></div>
      <div id="gallery-loading" class="fill-loader" style="display: none"></div>
    </div>

    <div id="lightbox-modal" class="lightbox">
      <span
        class="lightbox-close"
        onclick="closeLightbox()"
        role="button"
        aria-label="Close fullscreen image"
        tabindex="0"
        >&times;</span
      >
      <button
        class="nav-btn prev-btn"
        onclick="prevImage()"
        aria-label="Previous image"
      >
        &#10094;
      </button>
      <img id="lightbox-img" src="" alt="Fullscreen Sunset" />
      <button
        class="nav-btn next-btn"
        onclick="nextImage()"
        aria-label="Next image"
      >
        &#10095;
      </button>
      <div id="lightbox-date" class="lightbox-date"></div>
    </div>

    <div id="moment-modal" class="moment-modal">
      <button class="moment-back-btn" id="moment-back-btn" aria-label="Back" onclick="return false;">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <div id="moment-slider" class="moment-slider"></div>
      <div class="moment-loader" id="moment-loader">
        <div class="moment-spinner"></div>
      </div>
      <div class="moment-overlay">
        <div class="moment-info">
          <div class="moment-header">
            <h2 id="moment-location" class="moment-location"></h2>
            <div id="moment-live-badge" class="moment-live-badge" style="display: none;">
              <span class="live-dot"></span>
              <span>Live</span>
            </div>
          </div>
          <p id="moment-time" class="moment-time"></p>
          <p id="moment-more-text" class="moment-more-text" style="display: none;"></p>
        </div>
      </div>
      <div class="moment-thumbnails" id="moment-thumbnails"></div>
    </div>

    <div id="moment-gallery-sheet" class="moment-gallery-sheet">
      <div class="gallery-sheet-handle" id="moment-gallery-close"></div>
      <div class="gallery-sheet-header">
        <h3>All Moments</h3>
        <p class="gallery-sheet-subtitle">Tap to view</p>
      </div>
      <div class="gallery-sheet-grid" id="moment-gallery-grid"></div>
    </div>

    <div id="toast" class="toast">
      <span class="toast-icon"></span>
      <span id="toast-message"></span>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      defer
    ></script>
    <script
      src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"
      defer
    ></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service_worker.js")
            .then((reg) => console.log("Service Worker registered!", reg.scope))
            .catch((err) => console.error("Service Worker failed:", err));
        });
      }
    </script>
  </body>
</html>
